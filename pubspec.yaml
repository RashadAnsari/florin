name: florin
description: "A Flutter desktop app for Dutch ZZP bookkeeping."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  pdf: ^3.10.8
  printing: ^5.13.0
  file_picker: ^8.1.0
  window_manager: ^0.3.9
  intl: ^0.20.2
  csv: ^6.0.0
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  path: ^1.9.0
  path_provider: ^2.1.4
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.12
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  image_path: "assets/icon.png"
  macos:
    generate: true
    image_path: "assets/icon.png"
  windows:
    generate: true
    image_path: "assets/icon.png"
  linux:
    generate: true
    image_path: "assets/icon.png"

flutter:
  generate: true
  uses-material-design: true
