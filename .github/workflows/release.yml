name: Release

on:
  push:
    tags:
      - '*.*.*-*'

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../florin-linux-x64.tar.gz .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: florin-linux-x64
          path: florin-linux-x64.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath florin-windows-x64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: florin-windows-x64
          path: florin-windows-x64.zip

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: pod install
        working-directory: macos

      - name: Build macOS
        run: flutter build macos --release

      - name: Package macOS
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../florin-macos.zip Florin.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: florin-macos
          path: florin-macos.zip

  release:
    name: Create Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            florin-linux-x64.tar.gz
            florin-windows-x64.zip
            florin-macos.zip
          generate_release_notes: true
          body: |
            ## Installation

            This app is not code-signed. Follow the steps below for your platform.

            ### macOS

            1. Unzip `florin-macos.zip`
            2. Move `Florin.app` to your Applications folder
            3. Right-click `Florin.app` and choose **Open**
            4. Click **Open** in the dialog that appears

            If you see "damaged and can't be opened", run this in Terminal:
            ```
            xattr -cr /Applications/Florin.app
            ```
            Then try opening again.

            ### Windows

            1. Unzip `florin-windows-x64.zip`
            2. Run `florin.exe`
            3. If Windows SmartScreen appears, click **More info** then **Run anyway**

            ### Linux

            1. Extract `florin-linux-x64.tar.gz` to a folder, e.g. `~/.local/lib/florin/`
            2. Run `./florin`

            To add Florin to your app launcher:
            ```
            cp data/florin.desktop ~/.local/share/applications/
            ```
            Edit the `Exec=` line in that file to point to the full path of the `florin` binary.
